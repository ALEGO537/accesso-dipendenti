<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Accesso modulo dipendenti - Cristina Pozzi</title>

  <script>
    // ✅ URL WEBAPP (token + redirect) - il tuo /exec
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyeBvGpkYBBctML4iZjsvSYJP2Tas8RgiOwh7LDW4fjRZlcLwrrcZIfl4BbObV721HKcA/exec";

    // Dati dipendente
    const EMP_NAME = "Cristina Pozzi";
    const EMP_EMAIL = "cristinapozzi.pr@gmail.com";
    const PAGE_ID = "cristina";

    // Coordinate postazione
    const workLat = 45.58228;
    const workLon = 10.52226;

    // ✅ raggio 15 metri = 0.015 km
    const maxDistance = 0.015;

    // ✅ accuracy massima 15 metri
    const maxAccuracyMeters = 15;

    // Calcolo distanza GPS (km)
    function getDistanceFromLatLon(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lat2 - lat1) * Math.PI / 180; // <-- corretto sotto (fix)
      return { R, dLat, dLon };
    }

    // FIX: funzione corretta (sostituisce quella sopra)
    function distanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    function showError(html) {
      document.body.innerHTML =
        html +
        "<p><button onclick='location.reload()' style='padding:10px 14px;font-size:16px;'>Riprova</button></p>";
    }

    function makeItalianTimestamp() {
      const now = new Date();
      return (
        now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, '0') + "-" +
        String(now.getDate()).padStart(2, '0') + " " +
        String(now.getHours()).padStart(2, '0') + ":" +
        String(now.getMinutes()).padStart(2, '0') + ":" +
        String(now.getSeconds()).padStart(2, '0')
      );
    }

    function redirectToWebApp(lat, lon, italianTimestamp) {
      const qs = new URLSearchParams({
        name: EMP_NAME,
        email: EMP_EMAIL,
        page: PAGE_ID,
        lat: lat.toFixed(5),
        lon: lon.toFixed(5),
        ts: italianTimestamp
      });

      // ✅ La WebApp genera token e fa redirect al Google Form
      window.location.href = WEBAPP_URL + "?" + qs.toString();
    }

    window.onload = function () {
      if (!isMobileDevice()) {
        showError("<h2 style='color:red;'>Accesso consentito solo da dispositivi mobili.</h2>");
        return;
      }

      if (!navigator.geolocation) {
        showError("<h2 style='color:red;'>Il tuo dispositivo non supporta la geolocalizzazione.</h2>");
        return;
      }

      document.body.innerHTML = "<p>Verifico la posizione GPS…</p>";

      navigator.geolocation.getCurrentPosition(
        function (pos) {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const accuracy = pos.coords.accuracy; // metri

          // ✅ blocco se accuracy > 15m
          if (typeof accuracy === "number" && accuracy > maxAccuracyMeters) {
            showError(
              "<h2 style='color:red;'>Posizione troppo imprecisa (" + Math.round(accuracy) + " m).</h2>" +
              "<p>Attiva <b>Posizione precisa</b> e riprova (meglio vicino a una finestra).</p>"
            );
            return;
          }

          const distKm = distanceKm(lat, lon, workLat, workLon);
          const distMeters = Math.round(distKm * 1000);

          // ✅ raggio 15m
          if (distKm > maxDistance) {
            showError(
              "<h2 style='color:red;'>Vidimazione consentita solo sul luogo di lavoro (entro 15 metri).</h2>" +
              "<p>Distanza stimata: <b>" + distMeters + " m</b></p>" +
              "<p>Precisione GPS: <b>" + Math.round(accuracy) + " m</b></p>"
            );
            return;
          }

          // ✅ OK: vai alla WebApp (token + redirect al form)
          const italianTimestamp = makeItalianTimestamp();
          redirectToWebApp(lat, lon, italianTimestamp);
        },
        function () {
          showError(
            "<h2 style='color:red;'>Impossibile ottenere la posizione GPS.<br>Controlla le autorizzazioni e riprova.</h2>"
          );
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    };
  </script>
</head>

<body>
  <p>Verifico il dispositivo e la posizione…</p>
</body>
</html>
