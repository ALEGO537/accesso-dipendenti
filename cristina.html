<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Accesso modulo dipendenti - Cristina Pozzi</title>

  <script>
    // Coordinate del luogo di lavoro (Dental Class)
    const workLat = 45.58228;
    const workLon = 10.52226;

    // 20 metri (in km)
    const maxDistance = 0.02;

    // Blocca se precisione GPS peggiore di 15 metri
    const maxAccuracyMeters = 15;

    // Calcolo distanza GPS (km)
    function getDistanceFromLatLon(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    // Controllo dispositivo mobile
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    function showError(html) {
      document.body.innerHTML =
        html +
        "<p><button onclick='location.reload()' style='padding:10px 14px;font-size:16px;'>Riprova</button></p>";
    }

    // REGISTRAZIONE ORA DI APERTURA + REDIRECT AL MODULO
    function redirectToForm(lat, lon) {

      // ⏱️ ORA ITALIANA
      const now = new Date();
      const italianTimestamp =
        now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, '0') + "-" +
        String(now.getDate()).padStart(2, '0') + " " +
        String(now.getHours()).padStart(2, '0') + ":" +
        String(now.getMinutes()).padStart(2, '0') + ":" +
        String(now.getSeconds()).padStart(2, '0');

      const coordVal = encodeURIComponent(lat.toFixed(5) + ", " + lon.toFixed(5));
      const timestampVal = encodeURIComponent(italianTimestamp);

      const formURL =
        "https://docs.google.com/forms/d/e/1FAIpQLSeEqZ2OHgHk1QtCB4wVyDfG397uEfxTv2_kgz9hYsk6_9InZw/viewform" +
        "?usp=pp_url" +
        "&entry.1442131990=Cristina+Pozzi" +
        "&entry.1644042605=cristinapozzi.pr@gmail.com" +
        "&entry.1650758087=" + coordVal +
        "&entry.1485992978=" + timestampVal;

      // INVIO ORA DI APERTURA ALLA WEBAPP
      fetch("https://script.google.com/macros/s/AKfycbz51pBjM6ID-8g59NPHMDb9ocZRO4DS6hlKslnq3vXt-iFw5iX_zyYcocLh7OSX4o51PA/exec", {
        method: "POST",
        body: JSON.stringify({ timeOpened: italianTimestamp })
      })
      .then(() => window.location.href = formURL)
      .catch(() => window.location.href = formURL);
    }

    // Al caricamento della pagina
    window.onload = function () {

      if (!isMobileDevice()) {
        showError("<h2 style='color:red;'>Accesso consentito solo da dispositivi mobili.</h2>");
        return;
      }

      if (!navigator.geolocation) {
        showError("<h2 style='color:red;'>Il tuo dispositivo non supporta la geolocalizzazione.</h2>");
        return;
      }

      document.body.innerHTML = "<p>Verifico la posizione GPS…</p>";

      navigator.geolocation.getCurrentPosition(
        function (pos) {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const accuracy = pos.coords.accuracy; // metri

          // ✅ blocca se precisione troppo bassa (accuracy alta)
          if (typeof accuracy === "number" && accuracy > maxAccuracyMeters) {
            showError(
              "<h2 style='color:red;'>Posizione troppo imprecisa (" + Math.round(accuracy) + " m).</h2>" +
              "<p>Attiva <b>Posizione precisa</b> e riprova (meglio vicino a una finestra).</p>"
            );
            return;
          }

          const distKm = getDistanceFromLatLon(lat, lon, workLat, workLon);
          const distMeters = Math.round(distKm * 1000);

          if (distKm <= maxDistance) {
            redirectToForm(lat, lon);
          } else {
            showError(
              "<h2 style='color:red;'>Vidimazione consentita solo sul luogo di lavoro (entro 20 metri).</h2>" +
              "<p>Distanza stimata: <b>" + distMeters + " m</b></p>" +
              "<p>Precisione GPS: <b>" + Math.round(accuracy) + " m</b></p>"
            );
          }
        },
        function () {
          showError(
            "<h2 style='color:red;'>Impossibile ottenere la posizione GPS.<br>Controlla le autorizzazioni e riprova.</h2>"
          );
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0 // ✅ niente posizione “cached”
        }
      );
    };
  </script>
</head>

<body>
  <p>Verifico il dispositivo e la posizione…</p>
</body>
</html>
