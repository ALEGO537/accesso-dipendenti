<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Accesso modulo dipendenti - Alberto Poinelli</title>

  <script>
    // ✅ URL WebApp TOKEN (Apps Script) - Alberto
    const TOKEN_WEBAPP_URL = "https://script.google.com/macros/s/AKfycby2mOKorR-DqnB8A7PgKgr49-5wTzadQb-_FdjVH4d5SlYefCJQX1AXyY3jb9aeFUgJ/exec";

    // ✅ Campo TOKEN del Google Form - Alberto
    const TOKEN_ENTRY_ID = "496419871";

    // Coordinate della postazione (Alberto)
    const workLat = 45.582314;
    const workLon = 10.522671;
    const maxDistance = 0.05; // 50 metri (in km)

    // ✅ blocco se precisione GPS peggiore di 50m
    const maxAccuracyMeters = 50;

    // Calcolo distanza GPS (km)
    function getDistanceFromLatLon(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    // Controllo dispositivo mobile
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    function showError(html) {
      document.body.innerHTML =
        html +
        "<p><button onclick='location.reload()' style='padding:10px 14px;font-size:16px;'>Riprova</button></p>";
    }

    function makeItalianTimestamp() {
      const now = new Date();
      return (
        now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, '0') + "-" +
        String(now.getDate()).padStart(2, '0') + " " +
        String(now.getHours()).padStart(2, '0') + ":" +
        String(now.getMinutes()).padStart(2, '0') + ":" +
        String(now.getSeconds()).padStart(2, '0')
      );
    }

    // Richiede token monouso alla WebApp
    function requestToken(name, email, page) {
      return fetch(TOKEN_WEBAPP_URL, {
        method: "POST",
        body: JSON.stringify({ name, email, page })
      }).then(r => r.json());
    }

    // Apre Google Form con token precompilato
    function openForm(lat, lon, italianTimestamp, token) {
      const coordVal = encodeURIComponent(lat.toFixed(5) + ", " + lon.toFixed(5));
      const timestampVal = encodeURIComponent(italianTimestamp);
      const tokenVal = encodeURIComponent(token);

      const formURL =
        "https://docs.google.com/forms/d/e/1FAIpQLSd3CccNboypBthtOTenYuZLbMZ8kzKVAxbFs3UvNb36xSiwOQ/viewform" +
        "?usp=pp_url" +
        "&entry.1442131990=Alberto+Poinelli" +
        "&entry.1644042605=alberto.poinelli@gmail.com" +
        "&entry.1650758087=" + coordVal +
        "&entry.1485992978=" + timestampVal +
        "&entry." + TOKEN_ENTRY_ID + "=" + tokenVal;

      window.location.href = formURL;
    }

    window.onload = function () {
      if (!isMobileDevice()) {
        showError("<h2 style='color:red;'>Accesso consentito solo da dispositivi mobili.</h2>");
        return;
      }

      if (!navigator.geolocation) {
        showError("<h2 style='color:red;'>Il tuo dispositivo non supporta la geolocalizzazione.</h2>");
        return;
      }

      document.body.innerHTML = "<p>Verifico la posizione GPS…</p>";

      navigator.geolocation.getCurrentPosition(
        function (pos) {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const accuracy = pos.coords.accuracy; // metri

          // ✅ blocco accuracy alta
          if (typeof accuracy === "number" && accuracy > maxAccuracyMeters) {
            showError(
              "<h2 style='color:red;'>Posizione troppo imprecisa (" + Math.round(accuracy) + " m).</h2>" +
              "<p>Attiva <b>Posizione precisa</b> e riprova (meglio vicino a una finestra).</p>"
            );
            return;
          }

          const distKm = getDistanceFromLatLon(lat, lon, workLat, workLon);
          const distMeters = Math.round(distKm * 1000);

          // ✅ blocco fuori raggio
          if (distKm > maxDistance) {
            showError(
              "<h2 style='color:red;'>Vidimazione consentita solo sul luogo di lavoro (entro 50 metri).</h2>" +
              "<p>Distanza stimata: <b>" + distMeters + " m</b></p>" +
              "<p>Precisione GPS: <b>" + Math.round(accuracy) + " m</b></p>"
            );
            return;
          }

          // ✅ passed: genera token e apre il form
          const italianTimestamp = makeItalianTimestamp();

          requestToken("Alberto Poinelli", "alberto.poinelli@gmail.com", "alberto")
            .then(res => {
              if (!res || !res.ok || !res.token) {
                showError("<h2 style='color:red;'>Accesso negato: token non disponibile.</h2><p>Riprova.</p>");
                return;
              }
              openForm(lat, lon, italianTimestamp, res.token);
            })
            .catch(() => {
              showError("<h2 style='color:red;'>Errore di connessione (token).</h2><p>Riprova.</p>");
            });
        },
        function () {
          showError("<h2 style='color:red;'>Impossibile ottenere la posizione GPS.<br>Controlla le autorizzazioni e riprova.</h2>");
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0 // ✅ azzera posizione cached
        }
      );
    };
  </script>
</head>

<body>
  <p>Verifico il dispositivo e la posizione…</p>
</body>
</html>
