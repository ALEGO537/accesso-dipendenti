<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso modulo dipendenti - Danilo Torsa</title>

  <script>
    // =========================
    // CONFIGURAZIONE DIPENDENTE
    // =========================
    const EMPLOYEE_NAME = "Danilo Torsa";
    const EMPLOYEE_EMAIL = "torsadanilo69@gmail.com";
    const EMPLOYEE_PAGE = "danilo";

    // ✅ URL WebApp TOKEN (Apps Script)
    const TOKEN_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx1wtc3HWDsEgjACTWEfj49X0Tpa3xbrRGOIWKadSSgWzrgL2vc3yjzOqtraRNrwuPAjg/exec";

    // ✅ Chiave segreta da controllare anche lato Apps Script
    const SECRET_KEY = "DANILO_2026";

    // ✅ Campo TOKEN del Google Form
    const TOKEN_ENTRY_ID = "1132398875";

    // ✅ URL Google Form
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfXY2-PlnXqsbOypNoe97vjJhNuxA7IY0YAu7-6sNONGGDrhA/viewform";

    // ✅ Entry ID Google Form
    const ENTRY_NAME = "1442131990";
    const ENTRY_EMAIL = "1644042605";
    const ENTRY_COORDS = "1650758087";
    const ENTRY_TIMESTAMP = "1485992978";

    // =========================
    // CONFIGURAZIONE GEOLOCAL.
    // =========================
    const workLat = 45.582237;
    const workLon = 10.521929;
    const maxDistanceKm = 0.03;   // 30 metri
    const maxAccuracyMeters = 30; // precisione massima consentita

    // =========================
    // UTILITY
    // =========================
    function getDistanceFromLatLon(lat1, lon1, lat2, lon2) {
      const R = 6371; // km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    function showError(html) {
      document.body.innerHTML =
        html +
        "<p><button onclick='location.reload()' style='padding:10px 14px;font-size:16px;'>Riprova</button></p>";
    }

    function makeItalianTimestamp() {
      const now = new Date();
      return (
        now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, "0") + "-" +
        String(now.getDate()).padStart(2, "0") + " " +
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0") + ":" +
        String(now.getSeconds()).padStart(2, "0")
      );
    }

    // =========================
    // RICHIESTA TOKEN
    // =========================
    async function requestToken(name, email, page) {
      const response = await fetch(TOKEN_WEBAPP_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          name,
          email,
          page,
          key: SECRET_KEY
        })
      });

      return response.json();
    }

    // =========================
    // APERTURA FORM
    // =========================
    function openForm(lat, lon, italianTimestamp, token) {
      const coordVal = encodeURIComponent(lat.toFixed(5) + ", " + lon.toFixed(5));
      const timestampVal = encodeURIComponent(italianTimestamp);
      const tokenVal = encodeURIComponent(token);

      const formURL =
        GOOGLE_FORM_URL +
        "?usp=pp_url" +
        "&entry." + ENTRY_NAME + "=" + encodeURIComponent(EMPLOYEE_NAME) +
        "&entry." + ENTRY_EMAIL + "=" + encodeURIComponent(EMPLOYEE_EMAIL) +
        "&entry." + ENTRY_COORDS + "=" + coordVal +
        "&entry." + ENTRY_TIMESTAMP + "=" + timestampVal +
        "&entry." + TOKEN_ENTRY_ID + "=" + tokenVal;

      window.location.href = formURL;
    }

    // =========================
    // AVVIO
    // =========================
    window.onload = function () {
      if (!isMobileDevice()) {
        showError("<h2 style='color:red;'>Accesso consentito solo da dispositivi mobili.</h2>");
        return;
      }

      if (!navigator.geolocation) {
        showError("<h2 style='color:red;'>Il tuo dispositivo non supporta la geolocalizzazione.</h2>");
        return;
      }

      document.body.innerHTML = "<p>Verifico il dispositivo e la posizione GPS…</p>";

      navigator.geolocation.getCurrentPosition(
        async function (pos) {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const accuracy = pos.coords.accuracy;

          // blocco precisione scarsa
          if (typeof accuracy === "number" && accuracy > maxAccuracyMeters) {
            showError(
              "<h2 style='color:red;'>Posizione troppo imprecisa (" + Math.round(accuracy) + " m).</h2>" +
              "<p>Attiva <b>Posizione precisa</b> e riprova (meglio vicino a una finestra).</p>"
            );
            return;
          }

          const distKm = getDistanceFromLatLon(lat, lon, workLat, workLon);
          const distMeters = Math.round(distKm * 1000);

          // blocco fuori raggio
          if (distKm > maxDistanceKm) {
            showError(
              "<h2 style='color:red;'>Vidimazione consentita solo sul luogo di lavoro (entro 20 metri).</h2>" +
              "<p>Distanza stimata: <b>" + distMeters + " m</b></p>" +
              "<p>Precisione GPS: <b>" + Math.round(accuracy) + " m</b></p>"
            );
            return;
          }

          const italianTimestamp = makeItalianTimestamp();

          try {
            const res = await requestToken(EMPLOYEE_NAME, EMPLOYEE_EMAIL, EMPLOYEE_PAGE);

            if (!res || !res.ok || !res.token) {
              const reason = res && res.reason ? " (" + res.reason + ")" : "";
              showError(
                "<h2 style='color:red;'>Accesso negato: token non disponibile" + reason + ".</h2>" +
                "<p>Riprova.</p>"
              );
              return;
            }

            openForm(lat, lon, italianTimestamp, res.token);

          } catch (err) {
            showError(
              "<h2 style='color:red;'>Errore di connessione durante la richiesta del token.</h2>" +
              "<p>Controlla la connessione e riprova.</p>"
            );
          }
        },
        function () {
          showError(
            "<h2 style='color:red;'>Impossibile ottenere la posizione GPS.</h2>" +
            "<p>Controlla le autorizzazioni di localizzazione e riprova.</p>"
          );
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    };
  </script>
</head>

<body>
  <p>Verifico il dispositivo e la posizione…</p>
</body>
</html>
